# ══════════════════════════════════════════════════════════════
# Tutti — CI/CD: Build, Push & Deploy Frontend to GKE
# ══════════════════════════════════════════════════════════════
name: CI/CD - Frontend

on:
  push:
    branches: [main]
    paths:
      - "tutti/**"
      - "k8s/**"
      - ".github/workflows/ci-main.yml"
  pull_request:
    branches: [main]
    paths:
      - "tutti/**"
  workflow_dispatch:

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: ${{ secrets.GCP_PROJECT_ID }}/tutti/frontend
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}

jobs:
  # ================================================================
  # Job 1: Lint & Build (타입체크)
  # ================================================================
  test:
    name: 🧪 Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tutti
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: tutti/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # ================================================================
  # Job 2: Build & Push — Docker 이미지 빌드 후 Artifact Registry 푸시
  # ================================================================
  build-and-push:
    name: 🐳 Build & Push
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image-tag: ${{ steps.meta.outputs.short-sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "📌 Image tag: ${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: tutti
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short-sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # Job 3: Deploy — GKE에 Kustomize로 배포
  # ================================================================
  deploy:
    name: 🚀 Deploy to GKE
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Ensure namespace exists
        run: kubectl get namespace tutti 2>/dev/null || kubectl create namespace tutti

      - name: Deploy with Kustomize
        run: |
          cd k8s/base
          kustomize edit set image \
            REGION-docker.pkg.dev/PROJECT_ID/tutti/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}
          kubectl apply -k .

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for frontend rollout..."
          kubectl rollout status deployment/frontend -n tutti --timeout=300s

          echo ""
          echo "✅ Deployment successful!"
          echo "📋 Current pods:"
          kubectl get pods -n tutti -l app=frontend -o wide
